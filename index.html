<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ObedTime - Кейтеринг в Ташкенте</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo-container">
                <img id="main-logo" src="" alt="ObedTime Logo" style="height: 50px;">
                <div class="logo-text">Obed<span>Time</span></div>
            </div>
            <ul class="nav-links" id="nav-links">
                <!-- Nav items dynamically loaded -->
            </ul>
            <div class="header-right">
                <div class="lang-switcher">
                    <button onclick="setLanguage('ru')">RU</button>
                    <button onclick="setLanguage('uz')">UZ</button>
                    <button onclick="setLanguage('en')">EN</button>
                </div>
                <div class="burger">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container hero-content">
                <div class="hero-image-container">
                    <img src="https://images.unsplash.com/photo-1633945274405-b6c8069047b0?q=80&w=600&auto=format&fit=crop" alt="Plov" class="hero-dish">
                    <div class="steam-container">
                        <div class="steam-line"></div>
                        <div class="steam-line"></div>
                        <div class="steam-line"></div>
                    </div>
                </div>
                <h1 id="hero-title"></h1>
                <p id="hero-desc"></p>
                <a href="#contact" class="btn" id="hero-btn"></a>
            </div>
        </section>

        <section id="about" class="about container">
            <h2 id="about-title"></h2>
            <div class="about-grid">
                <div class="about-text">
                    <p id="about-text1"></p>
                    <p id="about-text2"></p>
                </div>
                <div class="about-stats" id="stats-container"></div>
            </div>
        </section>

        <section id="services" class="services">
            <div class="container">
                <h2 id="services-title"></h2>
                <div class="services-grid" id="services-grid"></div>
            </div>
        </section>

        <section id="menu" class="menu container">
            <h2 id="menu-title"></h2>
            <div class="dishes-grid" id="dishes-grid"></div>
        </section>

        <section id="location" class="location container">
            <h2 id="location-title">Наша локация</h2>
            <div class="map-container">
                <iframe id="map-iframe" src="" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <section id="contact" class="contact container">
            <h2 id="contact-title"></h2>
            <div class="contact-wrapper">
                <div class="contact-info">
                    <p><strong>Адрес:</strong> <span id="info-address"></span></p>
                    <p><strong>Телефон:</strong> <a id="info-phone" href=""></a></p>
                    <p><strong>Email:</strong> <span id="info-email"></span></p>
                    <p><strong>Рабочее время:</strong> <span id="info-hours"></span></p>
                </div>
                <form class="contact-form">
                    <input type="text" id="form-name" placeholder="" required>
                    <input type="email" id="form-email" placeholder="" required>
                    <textarea id="form-message" placeholder="" rows="5" required></textarea>
                    <button type="submit" class="btn" id="form-submit"></button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 ObedTime.uz. <span id="footer-rights"></span></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
