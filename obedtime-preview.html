<style>
  :root{
    --bg:#161513; --bg-soft:#1e1c19; --card:#211f1c; --line:#38342e;
    --gold:#f2a71b; --gold-dim:#c98a12; --cream:#f5f1e8; --cream-dim:#c9c3b6; --wine-soft:#7d2a2f;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--cream);font-family:'Manrope',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--cream);margin:0;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1140px;margin:0 auto;padding:0 24px;}
  .eyebrow{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:13.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);}
  section{padding:96px 0;}
  @media (max-width:720px){ section{padding:64px 0;} }

  .demo-banner{
    background:var(--gold);color:#161513;text-align:center;font-weight:700;
    font-size:13.5px;padding:10px 16px;position:sticky;top:0;z-index:50;
  }

  header{position:sticky;top:37px;z-index:40;background:rgba(22,21,19,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1140px;margin:0 auto;gap:18px;}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:21px;flex:none;}
  .brand img{width:38px;height:38px;border-radius:8px;object-fit:cover;flex:none;}
  .brand .b1{color:var(--gold);} .brand .b2{color:var(--cream);}
  .navlinks{display:flex;gap:28px;font-size:14.5px;font-weight:600;}
  .navlinks a{color:var(--cream-dim);transition:color .2s;}
  .navlinks a:hover{color:var(--gold);}
  .nav-right{display:flex;align-items:center;gap:16px;}
  .nav-cta{background:var(--gold);color:#161513;padding:10px 20px;border-radius:999px;font-weight:700;font-size:14px;white-space:nowrap;}
  .lang-toggle{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;flex:none;}
  .lang-toggle button{background:transparent;border:none;color:var(--cream-dim);font-family:'Manrope',sans-serif;font-size:12.5px;font-weight:700;padding:7px 12px;cursor:pointer;}
  .lang-toggle button.active{background:var(--gold);color:#161513;}
  .burger{display:none;background:none;border:none;color:var(--cream);font-size:24px;cursor:pointer;}
  @media (max-width:860px){
    .navlinks{display:none;} .nav-cta{display:none;} .burger{display:block;}
    .navlinks.open{display:flex;flex-direction:column;position:absolute;top:64px;left:0;right:0;background:var(--bg-soft);padding:20px 24px;border-bottom:1px solid var(--line);gap:18px;}
    .nav-cta.open{display:block;margin:14px 24px;text-align:center;}
  }

  .hero{padding-top:64px;padding-bottom:56px;}
  .hero .wrap{display:grid;grid-template-columns:1.15fr .85fr;gap:60px;align-items:center;}
  @media (max-width:900px){ .hero .wrap{grid-template-columns:1fr;} }
  .hero h1{font-size:clamp(34px,5.2vw,58px);line-height:1.06;letter-spacing:-.01em;}
  .hero h1 em{font-style:normal;color:var(--gold);}
  .hero p.lead{font-size:18px;color:var(--cream-dim);max-width:46ch;margin:22px 0 34px;}
  .cta-row{display:flex;gap:14px;flex-wrap:wrap;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 26px;border-radius:999px;font-weight:700;font-size:15px;cursor:pointer;border:1px solid transparent;transition:transform .15s,background .2s;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--gold);color:#161513;}
  .btn-primary:hover{background:#ffb733;}
  .btn-ghost{background:transparent;color:var(--cream);border-color:var(--line);}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .logo-hero-wrap{position:relative;width:min(320px,78vw);margin:0 auto;}
  .logo-hero-wrap::before{content:"";position:absolute;inset:-30px;border-radius:50%;background:radial-gradient(circle, rgba(242,167,27,.16), transparent 70%);}
  .logo-hero-img{position:relative;width:100%;border-radius:24px;box-shadow:0 30px 70px -20px rgba(0,0,0,.6);}

  .about .wrap{display:grid;grid-template-columns:.9fr 1.1fr;gap:56px;align-items:start;}
  @media (max-width:860px){ .about .wrap{grid-template-columns:1fr;} }
  .about h2{font-size:clamp(28px,3.6vw,40px);margin:10px 0 20px;}
  .about p{color:var(--cream-dim);font-size:16.5px;max-width:62ch;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:12px;}
  .stat{border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px;background:var(--card);}
  .stat .num{font-family:'Space Grotesk',sans-serif;font-size:28px;color:var(--gold);font-weight:700;}
  .stat .cap{font-size:13px;color:var(--cream-dim);margin-top:4px;}
  @media (max-width:520px){ .stat-grid{grid-template-columns:1fr 1fr;} }

  .services{background:var(--bg-soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .sec-head{max-width:640px;margin-bottom:48px;}
  .sec-head h2{font-size:clamp(28px,3.6vw,40px);margin:10px 0 14px;}
  .sec-head p{color:var(--cream-dim);font-size:16.5px;}
  .card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  @media (max-width:860px){ .card-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:560px){ .card-grid{grid-template-columns:1fr;} }
  .service-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:26px 22px;}
  .service-card .ic{width:44px;height:44px;border-radius:10px;background:rgba(242,167,27,.12);display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:var(--gold);}
  .service-card h3{font-size:18px;margin-bottom:8px;}
  .service-card p{color:var(--cream-dim);font-size:14.5px;margin:0;}

  .dish-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;}
  @media (max-width:980px){ .dish-grid{grid-template-columns:repeat(3,1fr);} }
  @media (max-width:640px){ .dish-grid{grid-template-columns:repeat(2,1fr);} }
  .dish-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .dish-photo.ph{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#2a2723,#1a1815);}
  .dish-body{padding:14px 16px 18px;}
  .dish-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15.5px;margin-bottom:6px;}
  .dish-price{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--gold);font-size:15px;}

  .schedule .sec-head{margin-bottom:36px;}
  .timeline{display:flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .timeline .slot{flex:1;padding:28px 26px;border-right:1px solid var(--line);}
  .timeline .slot:last-child{border-right:none;}
  .timeline .slot .lbl{font-size:13px;color:var(--cream-dim);text-transform:uppercase;letter-spacing:.06em;}
  .timeline .slot .t{font-family:'Space Grotesk',sans-serif;color:var(--gold);font-size:26px;font-weight:700;margin-top:6px;}
  .timeline .slot .d{color:var(--cream-dim);font-size:14px;margin-top:10px;}
  @media (max-width:760px){
    .timeline{flex-direction:column;}
    .timeline .slot{border-right:none;border-bottom:1px solid var(--line);}
    .timeline .slot:last-child{border-bottom:none;}
  }

  .contact{background:var(--bg-soft);border-top:1px solid var(--line);}
  .contact .wrap{display:grid;grid-template-columns:.9fr 1.1fr;gap:56px;}
  @media (max-width:900px){ .contact .wrap{grid-template-columns:1fr;} }
  .contact-info h2{font-size:clamp(28px,3.6vw,38px);margin:10px 0 18px;}
  .contact-info p{color:var(--cream-dim);}
  .info-line{display:flex;gap:12px;align-items:flex-start;margin-top:20px;font-size:15px;}
  .info-line .k{color:var(--gold);font-weight:700;font-size:13px;min-width:120px;}
  form.request-form{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:32px;display:flex;flex-direction:column;gap:16px;}
  .field label{display:block;font-size:13px;color:var(--cream-dim);margin-bottom:6px;font-weight:600;}
  .field input,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--cream);font-family:'Manrope',sans-serif;font-size:15px;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--gold);}
  .field textarea{resize:vertical;min-height:90px;}
  .form-msg{font-size:14px;padding:10px 14px;border-radius:10px;display:none;}
  .form-msg.ok{display:block;background:rgba(242,167,27,.12);color:var(--gold);}

  footer{padding:48px 0 28px;border-top:1px solid var(--line);}
  footer .wrap{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;}
  footer .fbrand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;display:flex;align-items:center;gap:8px;}
  footer .fbrand img{width:24px;height:24px;border-radius:6px;}
  footer .fmeta{font-size:13px;color:var(--cream-dim);display:flex;gap:18px;flex-wrap:wrap;}
</style>
</head>

      menuTitle:"Примеры блюд дня", menuSubtitle:"Цены и блюда могут меняться в зависимости от недельного меню.",
      scheduleTitle:"Каждый день точно по времени",
      sched1label:"Приём заказов", sched1time:"9:00 – 11:00", sched1text:"Принимаем ваши заказы утром в этом промежутке времени.",
      sched2label:"Доставка", sched2time:"12:00 – 13:00", sched2text:"Обед доставляется в ваш офис в это время.",
      contactTitle:"Оставьте заявку",
      contactText:"Оставьте имя и номер телефона — свяжемся с вами в течение 30 минут.",
      infoPhone:"+998 95 141 55 55", infoEmail:"info@obedtime.uz",
      infoAddress:"г. Ташкент, Чиланзарский р-н, Ок-тепа (ObedTime)",
      infoHours:"Ежедневно с 9:00 до 11:00", infoPhone2:"+998 95 141 55 55"
    }
  };

  var DISHES = [
    { emoji:"🍚", name_uz:"Osh (Palov)", name_ru:"Плов", price:"25 000 so'm" },
    { emoji:"🍜", name_uz:"Lag'mon", name_ru:"Лагман", price:"22 000 so'm" },
    { emoji:"🥟", name_uz:"Manti", name_ru:"Манты", price:"20 000 so'm" },
    { emoji:"🍲", name_uz:"Norin", name_ru:"Норин", price:"24 000 so'm" },
    { emoji:"🥟", name_uz:"Chuchvara", name_ru:"Чучвара", price:"20 000 so'm" }
  ];

  function escapeHtml(str){
    var d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }

  function renderDishes(lang){
    var host = document.getElementById('dishGrid');
    host.innerHTML = '';
    DISHES.forEach(function(d){
      var card = document.createElement('div');
      card.className = 'dish-card';
      var name = lang === 'ru' ? d.name_ru : d.name_uz;
      card.innerHTML =
        '<div class="dish-photo ph">' + d.emoji + '</div>' +
        '<div class="dish-body">' +
          '<div class="dish-name">' + escapeHtml(name) + '</div>' +
          '<div class="dish-price">' + escapeHtml(d.price) + '</div>' +
        '</div>';
      host.appendChild(card);
    });
  }

  function setLanguage(lang){
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      el.textContent = I18N[lang][el.getAttribute('data-i18n')] || '';
    });
    document.querySelectorAll('[data-edit]').forEach(function(el){
      var key = el.getAttribute('data-edit');
      if (CONTENT[lang][key] !== undefined) el.innerHTML = CONTENT[lang][key];
    });
    document.querySelectorAll('#langToggle button').forEach(function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });
    document.documentElement.lang = lang;
    renderDishes(lang);
  }

  document.getElementById('langToggle').addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if(!btn) return;
    setLanguage(btn.getAttribute('data-lang'));
  });

  document.getElementById('burgerBtn').addEventListener('click', function(){
    document.getElementById('navlinks').classList.toggle('open');
    document.getElementById('navcta').classList.toggle('open');
  });

  document.getElementById('requestForm').addEventListener('submit', function(e){
    e.preventDefault();
    var lang = document.documentElement.lang || 'uz';
    var msg = document.getElementById('formMsg');
    msg.textContent = I18N[lang].formDemo;
    msg.className = 'form-msg ok';
  });

  setLanguage('uz');
})();
</script>
</body>
</html>
